<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B"/>
      <stop offset="100%" stop-color="#1C2541"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="20"/>

  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">外挂大脑 (The External Brain)</text>
  <text x="400" y="80" font-family="system-ui, sans-serif" font-size="16" fill="#A0AABF" text-anchor="middle">突破 LLM 的上下文窗口与遗忘曲线</text>

  <!-- AI Brain / Context Window -->
  <path d="M 400 130 C 480 130, 520 180, 520 250 C 520 320, 480 370, 400 370 C 320 370, 280 320, 280 250 C 280 180, 320 130, 400 130" fill="url(#glass)" stroke="#0575E6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="240" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#0575E6" text-anchor="middle">LLM 上下文</text>
  <text x="400" y="265" font-family="system-ui, sans-serif" font-size="14" fill="#A0AABF" text-anchor="middle">(极易被冲刷)</text>

  <!-- External Assets -->
  <!-- Landscape -->
  <rect x="50" y="150" width="180" height="60" rx="10" fill="#1C2541" stroke="#F2C94C" stroke-width="2"/>
  <text x="140" y="186" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#F2C94C" text-anchor="middle">项目全景图</text>
  
  <!-- Task List -->
  <rect x="50" y="230" width="180" height="60" rx="10" fill="#1C2541" stroke="#00F260" stroke-width="2"/>
  <text x="140" y="266" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#00F260" text-anchor="middle">任务清单</text>

  <!-- ADRs -->
  <rect x="50" y="310" width="180" height="60" rx="10" fill="#1C2541" stroke="#EA580C" stroke-width="2"/>
  <text x="140" y="346" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#EA580C" text-anchor="middle">决策日志 (ADR)</text>

  <!-- Data Flow Arrows -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,5" opacity="0.6">
    <path d="M 230 180 L 300 180 L 340 210"/>
    <path d="M 230 260 L 300 260 L 330 250"/>
    <path d="M 230 340 L 300 340 L 340 290"/>
  </g>

  <!-- Anchoring Text -->
  <rect x="570" y="220" width="180" height="60" rx="10" fill="#00F260" opacity="0.1"/>
  <text x="660" y="245" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#00F260" text-anchor="middle">精准召回</text>
  <text x="660" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#00F260" text-anchor="middle">由指挥官负责组装上下文</text>
  
  <path d="M 500 250 L 560 250" fill="none" stroke="#00F260" stroke-width="3"/>
  <polygon points="560,250 550,245 550,255" fill="#00F260"/>

</svg>
