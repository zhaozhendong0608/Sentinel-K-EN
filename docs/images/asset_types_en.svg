<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B"/>
      <stop offset="100%" stop-color="#1C2541"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="20"/>

  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Asset Grading System</text>
  <text x="400" y="80" font-family="system-ui, sans-serif" font-size="16" fill="#A0AABF" text-anchor="middle">Distinguish what the machine can touch and what it cannot</text>

  <!-- Solid Strict -->
  <rect x="60" y="140" width="200" height="200" rx="10" fill="#1C2541" stroke="#EA580C" stroke-width="3"/>
  <text x="160" y="180" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#EA580C" text-anchor="middle">Solid-Strict</text>
  <text x="160" y="210" font-family="system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Hardest Assets</text>
  <text x="160" y="250" font-family="system-ui, sans-serif" font-size="12" fill="#A0AABF" text-anchor="middle">DB Models, Auth, Infra</text>
  <rect x="100" y="280" width="120" height="30" rx="5" fill="#EA580C" opacity="0.2"/>
  <text x="160" y="300" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#EA580C" text-anchor="middle">ADR Required</text>

  <!-- Solid Soft -->
  <rect x="300" y="140" width="200" height="200" rx="10" fill="#1C2541" stroke="#F2C94C" stroke-width="3"/>
  <text x="400" y="180" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#F2C94C" text-anchor="middle">Solid-Soft</text>
  <text x="400" y="210" font-family="system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Semi-Hard Assets</text>
  <text x="400" y="250" font-family="system-ui, sans-serif" font-size="12" fill="#A0AABF" text-anchor="middle">Reused Components, Service</text>
  <rect x="340" y="280" width="125" height="30" rx="5" fill="#F2C94C" opacity="0.2"/>
  <text x="402" y="300" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#F2C94C" text-anchor="middle">Pass Test to Proceed</text>

  <!-- Liquid -->
  <rect x="540" y="140" width="200" height="200" rx="10" fill="#1C2541" stroke="#00F260" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="640" y="180" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#00F260" text-anchor="middle">Liquid</text>
  <text x="640" y="210" font-family="system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Liquid Assets</text>
  <text x="640" y="250" font-family="system-ui, sans-serif" font-size="12" fill="#A0AABF" text-anchor="middle">UI Views, Temp Scripts</text>
  <rect x="580" y="280" width="120" height="30" rx="5" fill="#00F260" opacity="0.2"/>
  <text x="640" y="300" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#00F260" text-anchor="middle">AI Freestyle Zone</text>

  <!-- AI interaction arrows -->
  <path d="M 640 100 L 640 130" fill="none" stroke="#00F260" stroke-width="3"/>
  <polygon points="640,140 635,130 645,130" fill="#00F260"/>
  
  <path d="M 400 100 L 400 130" fill="none" stroke="#F2C94C" stroke-width="3" stroke-dasharray="4,4"/>
  <polygon points="400,140 395,130 405,130" fill="#F2C94C"/>

  <path d="M 160 100 L 160 130" fill="none" stroke="#EA580C" stroke-width="3"/>
  <line x1="145" y1="125" x2="175" y2="125" stroke="#EA580C" stroke-width="4"/>
</svg>
